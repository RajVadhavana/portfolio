<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Raj Portfolio</title>
    <meta name="robots" content="noindex, nofollow">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body>

<!-- ============ LOGIN SCREEN ============ -->
<div id="login-screen" class="login-screen">
    <div class="login-card">
        <div class="login-logo">
            <i class='bx bx-shield-quarter'></i>
        </div>
        <h1>Portfolio Admin</h1>
        <p>Sign in to manage your portfolio content</p>
        <form id="login-form">
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <i class='bx bx-lock-alt'></i>
                    <input type="password" id="admin-password" placeholder="Enter admin password" autocomplete="current-password">
                    <i class='bx bx-show toggle-pw' id="toggle-pw"></i>
                </div>
            </div>
            <div id="login-error" class="error-msg hidden">❌ Wrong password. Try again.</div>
            <button type="submit" class="login-btn">
                <i class='bx bx-log-in'></i> Login
            </button>
        </form>
        <p class="hint">Default password: <strong>raj@admin123</strong></p>
    </div>
</div>

<!-- ============ ADMIN DASHBOARD ============ -->
<div id="admin-panel" class="admin-panel hidden">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <i class='bx bx-shield-quarter'></i>
                <span>Portfolio Admin</span>
            </div>
            <button class="sidebar-close" id="sidebar-close"><i class='bx bx-x'></i></button>
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="nav-item active" data-tab="hero">
                <i class='bx bx-home-alt'></i> <span>Hero Section</span>
            </a>
            <a href="#" class="nav-item" data-tab="about">
                <i class='bx bx-user'></i> <span>About Me</span>
            </a>
            <a href="#" class="nav-item" data-tab="skills">
                <i class='bx bx-code-alt'></i> <span>Skills</span>
            </a>
            <a href="#" class="nav-item" data-tab="projects">
                <i class='bx bx-folder-open'></i> <span>Projects</span>
            </a>
            <a href="#" class="nav-item" data-tab="experience">
                <i class='bx bx-briefcase'></i> <span>Experience</span>
            </a>
            <a href="#" class="nav-item" data-tab="education">
                <i class='bx bx-graduation'></i> <span>Education</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="../index.html" target="_blank" class="view-site-btn">
                <i class='bx bx-link-external'></i> View Portfolio
            </a>
            <button class="logout-btn" id="logout-btn">
                <i class='bx bx-log-out'></i> Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="topbar">
            <button class="menu-toggle" id="menu-toggle"><i class='bx bx-menu'></i></button>
            <div class="topbar-title" id="topbar-title">Hero Section</div>
            <div class="topbar-actions">
                <button class="save-btn" id="save-btn" onclick="saveAllData()">
                    <i class='bx bx-save'></i> Save Changes
                </button>
            </div>
        </div>

        <div class="content-area">

            <!-- TOAST NOTIFICATION -->
            <div id="toast" class="toast hidden">
                <i class='bx bx-check-circle'></i> <span id="toast-msg">Saved!</span>
            </div>

            <!-- ===== HERO TAB ===== -->
            <section class="tab-content active" id="tab-hero">
                <div class="section-card">
                    <h2 class="section-title"><i class='bx bx-home-alt'></i> Hero Section</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Your Name</label>
                            <input type="text" id="hero-name" placeholder="Raj Vadhavana">
                        </div>
                        <div class="form-group">
                            <label>Greeting Text</label>
                            <input type="text" id="hero-greeting" placeholder="Hello, I'm Raj">
                        </div>
                        <div class="form-group full">
                            <label>Typing Roles <small>(comma separated)</small></label>
                            <input type="text" id="hero-roles" placeholder="Frontend Developer, Web Designer, Python Developer">
                        </div>
                        <div class="form-group full">
                            <label>Tagline / Description</label>
                            <textarea id="hero-tagline" rows="3" placeholder="Short description about yourself..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>LinkedIn URL</label>
                            <div class="input-wrap">
                                <i class='bx bxl-linkedin'></i>
                                <input type="url" id="hero-linkedin" placeholder="https://linkedin.com/in/...">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Instagram URL</label>
                            <div class="input-wrap">
                                <i class='bx bxl-instagram'></i>
                                <input type="url" id="hero-instagram" placeholder="https://instagram.com/...">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>GitHub URL</label>
                            <div class="input-wrap">
                                <i class='bx bxl-github'></i>
                                <input type="url" id="hero-github" placeholder="https://github.com/...">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>CV File Name <small>(e.g. raj.pdf)</small></label>
                            <div class="input-wrap">
                                <i class='bx bx-file'></i>
                                <input type="text" id="hero-cv" placeholder="raj (1).pdf">
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- ===== ABOUT TAB ===== -->
            <section class="tab-content hidden" id="tab-about">
                <div class="section-card">
                    <h2 class="section-title"><i class='bx bx-user'></i> About Me</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Job Title <small>(shown under "I'm a...")</small></label>
                            <input type="text" id="about-title" placeholder="Frontend Developer">
                        </div>
                        <div class="form-group full">
                            <label>Short Description</label>
                            <textarea id="about-short" rows="3" placeholder="Short intro shown by default..."></textarea>
                        </div>
                        <div class="form-group full">
                            <label>Long Description <small>(shown after "Read More")</small></label>
                            <textarea id="about-long" rows="5" placeholder="Detailed description..."></textarea>
                        </div>
                    </div>
                </div>
            </section>

            <!-- ===== SKILLS TAB ===== -->
            <section class="tab-content hidden" id="tab-skills">
                <div class="section-card">
                    <h2 class="section-title"><i class='bx bx-code-alt'></i> Skills</h2>
                    <div id="skills-list" class="items-list"></div>
                    <button class="add-btn" onclick="addSkill()">
                        <i class='bx bx-plus'></i> Add New Skill
                    </button>
                </div>
            </section>

            <!-- ===== PROJECTS TAB ===== -->
            <section class="tab-content hidden" id="tab-projects">
                <div class="section-card">
                    <h2 class="section-title"><i class='bx bx-folder-open'></i> Projects</h2>
                    <div id="projects-list" class="items-list"></div>
                    <button class="add-btn" onclick="addProject()">
                        <i class='bx bx-plus'></i> Add New Project
                    </button>
                </div>
            </section>

            <!-- ===== EXPERIENCE TAB ===== -->
            <section class="tab-content hidden" id="tab-experience">
                <div class="section-card">
                    <h2 class="section-title"><i class='bx bx-briefcase'></i> Experience</h2>
                    <div id="experience-list" class="items-list"></div>
                    <button class="add-btn" onclick="addExperience()">
                        <i class='bx bx-plus'></i> Add Experience
                    </button>
                </div>
            </section>

            <!-- ===== EDUCATION TAB ===== -->
            <section class="tab-content hidden" id="tab-education">
                <div class="section-card">
                    <h2 class="section-title"><i class='bx bx-graduation'></i> Education</h2>
                    <div id="education-list" class="items-list"></div>
                    <button class="add-btn" onclick="addEducation()">
                        <i class='bx bx-plus'></i> Add Education
                    </button>
                </div>
            </section>

        </div>
    </main>
</div>

<script src="admin.js"></script>
</body>
</html>
